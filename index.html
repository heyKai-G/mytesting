 <!DOCTYPE html>
 <html>
 <head>
	<title>Barangay e-Service Request Portal</title>
	<link rel="stylesheet" href="CSS/Framwork/bootstrap/css/bootstrap.css">
	<link rel="stylesheet" href="CSS/Styles/body.css">
	<link rel="stylesheet" href="CSS/Styles/containers.css">
 </head>
	 <body>
		<div id="main_container" class="container text-center py-4 mt-5">
			<h1 id="title">Applicant Information</h1>
			<form id="form" action="process.php" method="post">

				<!-- Row 1: Name & Age -->
				<div class="row justify-content-center g-3 mb-3">
					<div class="col-12 col-sm-6 col-md-4">
					<label class="form-label">Name:</label>
					<input required type="text" name="fullName" class="form-control">
					</div>
					<div class="col-12 col-sm-6 col-md-2">
					<label class="form-label">Age:</label>
					<input required type="number" name="age" class="form-control" min="18" max="100">
					</div>
				</div>

				<!-- Row 2: Address & Date -->
				<div class="row justify-content-center g-3 mb-4">
					<div class="col-12 col-sm-6 col-md-4">
					<label class="form-label">Address:</label>
					<input required type="text" name="address" class="form-control">
					</div>
					<div class="col-12 col-sm-6 col-md-2">
					<label class="form-label">Date:</label>
					<input required type="date" name="date" class="form-control">
					</div>
				</div>

				<!-- Service Table Header -->
				<div class="row fw-bold mb-2 d-none d-md-flex">
					<div class="col-md-5">Service Type</div>
					<div class="col-md-3">Copies</div>
					<div class="col-md-4">Urgency</div>
				</div>

				<!-- Service Row 1 -->
				<div class="row g-2 mb-2 align-items-center">
					<div class="col-12 col-md-5">
						<label class="form-label d-md-none">Service Type</label>
						<select required name="serviceType[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="Barangay Clearance">Barangay Clearance</option>
							<option value="Indigency Certificate">Indigency Certificate</option>
							<option value="Residency Certificate">Residency Certificate</option>
							<option value="Business Permit">Business Permit</option>
						</select>
					</div>
					<div class="col-12 col-md-3">
						<label class="form-label d-md-none">Copies</label>
						<input required type="number" name="copies[]" class="form-control">
					</div>
					<div class="col-12 col-md-4">
						<label class="form-label d-md-none">Urgency</label>
						<select required name="urgency[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="normal">Normal</option>
							<option value="urgent">Urgent</option>
						</select>
					</div>
				</div>

				<!-- Service Row 2 -->
				<div class="row g-2 mb-2 align-items-center">
					<div class="col-12 col-md-5">
						<label class="form-label d-md-none">Service Type</label>
						<select required name="serviceType[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="Barangay Clearance">Barangay Clearance</option>
							<option value="Indigency Certificate">Indigency Certificate</option>
							<option value="Residency Certificate">Residency Certificate</option>
							<option value="Business Permit">Business Permit</option>
						</select>
					</div>
					<div class="col-12 col-md-3">
						<label class="form-label d-md-none">Copies</label>
						<input required type="number" name="copies[]" class="form-control">
					</div>
					<div class="col-12 col-md-4">
						<label class="form-label d-md-none">Urgency</label>
						<select required name="urgency[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="normal">Normal</option>
							<option value="urgent">Urgent</option>
						</select>
					</div>
				</div>
				<!-- Service Row 3 -->
				<div class="row g-2 mb-4 align-items-center">
					<div class="col-12 col-md-5">
						<label class="form-label d-md-none">Service Type</label>
						<select required name="serviceType[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="Barangay Clearance">Barangay Clearance</option>
							<option value="Indigency Certificate">Indigency Certificate</option>
							<option value="Residency Certificate">Residency Certificate</option>
							<option value="Business Permit">Business Permit</option>
						</select>
					</div>
					<div class="col-12 col-md-3">
						<label class="form-label d-md-none">Copies</label>
						<input required type="number" name="copies[]" class="form-control">
					</div>
					<div class="col-12 col-md-4">
						<label class="form-label d-md-none">Urgency</label>
						<select required name="urgency[]" class="form-select">
							<option value="">Choose Here</option>
							<option value="normal">Normal</option>
							<option value="urgent">Urgent</option>
						</select>
					</div>
				</div>
				<button type="submit" class="btn btn-success">Submit</button>
			</form>
		</div>
		<script src="JS/script.js"></script>
	 </body>
 </html>
